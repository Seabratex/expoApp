<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Fundo ── -->
  <rect width="1200" height="280" fill="#070d1a"/>

  <!-- ── Padrão de pontos sutis ── -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#1a3060" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="1200" height="280" fill="url(#dots)"/>

  <!-- ── Linhas verticais decorativas (esquerda) ── -->
  <rect x="60"  y="30" width="2" height="220" fill="#1a3060"/>
  <rect x="72"  y="70" width="1" height="140" fill="#1a3060" opacity="0.4"/>

  <!-- ── Linhas verticais decorativas (direita) ── -->
  <rect x="1138" y="30" width="2" height="220" fill="#1a3060"/>
  <rect x="1127" y="70" width="1" height="140" fill="#1a3060" opacity="0.4"/>

  <!-- ── Barra ouro topo ── -->
  <rect x="0" y="0" width="1200" height="4" fill="#d4af37"/>

  <!-- ── Título principal ── -->
  <text
    x="600" y="128"
    text-anchor="middle"
    font-size="78"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="14"
    font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
  >ISO / IEC</text>

  <!-- ── Subtítulo ── -->
  <text
    x="600" y="168"
    text-anchor="middle"
    font-size="17"
    fill="#8899aa"
    letter-spacing="3.5"
    font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
  >Certificação e Aplicação em Projetos de TI</text>

  <!-- ── Divisor ouro central ── -->
  <rect x="480" y="191" width="240" height="2" fill="#d4af37" rx="1"/>

  <!-- ── Marca SEABRA® ── -->
  <text
    x="600" y="233"
    text-anchor="middle"
    font-size="26"
    font-weight="800"
    fill="#d4af37"
    letter-spacing="9"
    font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
  >SEABRA&#174;</text>

  <!-- ── Label Gestão de TI ── -->
  <text
    x="600" y="258"
    text-anchor="middle"
    font-size="12"
    fill="#4a6fa5"
    letter-spacing="5"
    font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif"
  >GESTÃO DE TI</text>

  <!-- ── Barra ouro base ── -->
  <rect x="0" y="276" width="1200" height="4" fill="#d4af37"/>

</svg>
